steps:
  # ── Backend: Build Docker Image ────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-backend"
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/civicprioritize-backend:$SHORT_SHA"
      - -t
      - "gcr.io/$PROJECT_ID/civicprioritize-backend:latest"
      - ./backend

  # ── Backend: Push to GCR ──────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-backend"
    waitFor: ["build-backend"]
    args:
      - push
      - "gcr.io/$PROJECT_ID/civicprioritize-backend:$SHORT_SHA"

  # ── Backend: Deploy to Cloud Run ──────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-backend"
    waitFor: ["push-backend"]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - civicprioritize-backend
      - --image=gcr.io/$PROJECT_ID/civicprioritize-backend:$SHORT_SHA
      - --platform=managed
      - --region=asia-south1
      - --allow-unauthenticated
      - --port=5000
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --timeout=60
      - --set-env-vars=NODE_ENV=production,PORT=5000
      - --update-secrets=MONGODB_URI=MONGODB_URI:latest
      - --update-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest
      - --update-secrets=CORS_ORIGIN=CORS_ORIGIN:latest

  # ── Get Backend URL ───────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "get-backend-url"
    waitFor: ["deploy-backend"]
    entrypoint: bash
    args:
      - -c
      - |
        BACKEND_URL=$(gcloud run services describe civicprioritize-backend --region=asia-south1 --format="value(status.url)")
        echo "Detected backend URL: $$BACKEND_URL"
        echo -n "$$BACKEND_URL" > /workspace/backend_url.txt

  # ── Frontend: Build Docker Image ──────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-frontend"
    waitFor: ["deploy-backend"]
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/civicprioritize-frontend:$SHORT_SHA"
      - -t
      - "gcr.io/$PROJECT_ID/civicprioritize-frontend:latest"
      - ./frontend

  # ── Frontend: Push to GCR ─────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-frontend"
    waitFor: ["build-frontend"]
    args:
      - push
      - "gcr.io/$PROJECT_ID/civicprioritize-frontend:$SHORT_SHA"

  # ── Frontend: Deploy to Cloud Run ─────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-frontend"
    waitFor: ["push-frontend", "get-backend-url"]
    entrypoint: bash
    args:
      - -c
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        gcloud run deploy civicprioritize-frontend \
          --image="gcr.io/$PROJECT_ID/civicprioritize-frontend:$SHORT_SHA" \
          --platform=managed \
          --region=asia-south1 \
          --allow-unauthenticated \
          --port=3000 \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=5 \
          --timeout=60 \
          --set-env-vars="NODE_ENV=production,PORT=3000,HOSTNAME=0.0.0.0,BACKEND_URL=$$BACKEND_URL"

images:
  - "gcr.io/$PROJECT_ID/civicprioritize-backend:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/civicprioritize-backend:latest"
  - "gcr.io/$PROJECT_ID/civicprioritize-frontend:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/civicprioritize-frontend:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
